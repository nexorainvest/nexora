<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Invest - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0c10; color: #ffffff; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 450px; }

        /* Login Screen Style */
        #loginScreen { position: fixed; top:0; left:0; width:100%; height:100%; background:#0b0c10; z-index: 99999; display:flex; justify-content:center; align-items:center; padding:20px; }
        .login-box { background:#12141c; border:1px solid #c5a059; padding:30px; border-radius:20px; width:100%; max-width:380px; text-align:center; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; margin-bottom: 25px; width: 100%; }
        .welcome-msg { font-size: 22px; font-weight: bold; width: 55%; }
        .welcome-msg span { display: block; font-size: 14px; color: #858585; font-weight: normal; margin-top: 5px; }
        .header-buttons { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .btn-top-profile { background-color: #1a1c23; border: 1px solid #2c2f3b; color: #c5a059; padding: 8px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-logout { background-color: #ff4d4d; border: none; color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }

        /* Soldes */
        .soldes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; width: 100%; }
        .solde-card { background-color: #12141c; border-radius: 16px; padding: 20px; border: 1px solid #1f2833; display: flex; flex-direction: column; justify-content: space-between; min-height: 150px; }
        .solde-title { color: #6c727f; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .solde-value { font-size: 24px; font-weight: bold; margin-top: 10px; margin-bottom: 15px; color: #ffffff; }
        .btn-transfer { background-color: #c5a059; color: #0b0c10; border: none; padding: 10px; border-radius: 10px; font-weight: bold; font-size: 12px; cursor: pointer; width: 100%; }

        /* Active Plan & Timer */
        .active-plan-section { background-color: #12141c; border-radius: 16px; padding: 20px; border: 1px solid #1f2833; margin-bottom: 25px; width: 100%; }
        .plan-box { display: flex; align-items: center; gap: 15px; }
        .plan-icon { background-color: #1a1c23; width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 24px; color: #c5a059; }
        .timer-badge { background-color: #ff4d4d; color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-top: 5px; display: inline-block; font-family: monospace; }

        /* Menu */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .menu-btn { background-color: #12141c; border: 1px solid #1f2833; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
        .menu-btn:hover { border-color: #c5a059; }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background-color: #12141c; border: 1px solid #c5a059; border-radius: 20px; padding: 25px; width: 100%; max-width: 440px; max-height: 85vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; color: #858585; font-size: 24px; cursor: pointer; }
        .modal-title { color: #c5a059; font-size: 18px; font-weight: bold; margin-bottom: 20px; text-align: center; text-transform: uppercase; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; color: #6c727f; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; background-color: #1a1c23; border: 1px solid #2c2f3b; color: #ffffff; padding: 12px; border-radius: 10px; font-size: 14px; outline: none; }
        
        .address-box { background-color: #1a1c23; border: 1px dashed #c5a059; padding: 12px; border-radius: 10px; font-size: 12px; word-break: break-all; display: flex; justify-content: space-between; align-items: center; }
        .btn-copy { background-color: #c5a059; color: #0b0c10; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Tables & Lists */
        .modal-plans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .modal-plan-card { background-color: #1a1c23; border: 1px solid #2c2f3b; border-radius: 14px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .modal-plan-stats { background-color: #12141c; width: 100%; padding: 8px; border-radius: 8px; font-size: 10px; text-align: left; margin-bottom: 12px; }
        .btn-act { width: 100%; padding: 8px; border-radius: 8px; font-weight: bold; font-size: 11px; cursor: pointer; border: none; }
        .btn-act.available-btn { background-color: #c5a059; color: #0b0c10; }
        
        .filleuls-section { margin-top: 20px; border-top: 1px dashed #2c2f3b; padding-top: 15px; }
        .table-custom { width: 100%; border-collapse: collapse; font-size: 12px; }
        .table-custom th, .table-custom td { padding: 10px 6px; text-align: left; border-bottom: 1px solid #1a1c23; }
        .table-custom th { color: #6c727f; text-transform: uppercase; font-size: 10px; }

        /* Admin UI Buttons */
        .btn-admin-gate { background: linear-gradient(90deg, #c5a059, #e5c07b); color:#0b0c10; width:100%; padding:14px; border-radius:12px; font-weight:bold; border:none; margin-top:25px; cursor:pointer; text-transform:uppercase; font-size:13px; letter-spacing:1px; }
        .btn-edit { background-color: #3a86ff; color: white; padding: 5px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; margin-right: 4px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2 style="color:#c5a059; margin-bottom:20px; font-size:22px;">CONNEXION NEXORA</h2>
            <form id="loginForm">
                <div class="form-group" style="text-align:left;">
                    <label>Email Utilisateur</label>
                    <input type="email" id="loginEmail" placeholder="rkmotion94@gmail.com" required style="border-color:#c5a059;">
                </div>
                <div class="form-group" style="text-align:left;">
                    <label>Mot de passe</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required style="border-color:#c5a059;">
                </div>
                <button type="submit" class="btn-transfer" style="padding:12px; margin-top:10px; font-size:14px;">SE CONNECTER</button>
            </form>
        </div>
    </div>

    <div class="app-container">
        <div class="header">
            <div class="welcome-msg">
                Bonjour, <span id="displayUserName" style="display:inline; font-size:22px; color:#fff;">Grace</span> 👋
                <span>Tableau de bord Nexora Invest.</span>
            </div>
            <div class="header-buttons">
                <button class="btn-top-profile" onclick="openModal('profileModal')">👤 Profil</button>
                <button class="btn-logout" onclick="logoutSystem()">Logout 🚪</button>
            </div>
        </div>

        <div class="soldes-grid">
            <div class="solde-card">
                <div class="solde-title">Solde Principal</div>
                <div class="solde-value"><span id="mainBalance">0.00</span> USDT</div>
                <div class="solde-desc">Pour retrait et activation</div>
            </div>
            <div class="solde-card">
                <div class="solde-title">Solde de Revenus</div>
                <div class="solde-value"><span id="profitBalance">0.00</span> USDT</div>
                <button class="btn-transfer" onclick="transferProfit()">↑ Transférer au Principal</button>
            </div>
        </div>

        <div class="active-plan-section">
            <div class="section-label" style="font-size:13px; font-weight:bold; margin-bottom:10px;">Plan en cours d'utilisation</div>
            <div class="plan-box" id="activePlanBox">
                <div class="plan-icon" id="planIconStatus">💤</div>
                <div class="plan-info">
                    <h4 id="activePlanName" style="color: #858585;">Aucun plan actif</h4>
                    <p id="planTimerContainer" style="font-size:12px; color:#858585;">Activez n'importe quel plan maintenant.</p>
                </div>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-btn" onclick="openModal('depositModal')"><div>💳</div><div style="font-size:13px; font-weight:bold; margin-top:10px;">Déposer</div></div>
            <div class="menu-btn" onclick="openModal('withdrawModal')"><div>💸</div><div style="font-size:13px; font-weight:bold; margin-top:10px;">Retirer</div></div>
            <div class="menu-btn" onclick="openModal('plansModal')"><div>📈</div><div style="font-size:13px; font-weight:bold; margin-top:10px;">Voir les plans</div></div>
            <div class="menu-btn" onclick="openModal('historyModal')"><div>📜</div><div style="font-size:13px; font-weight:bold; margin-top:10px;">Historique</div></div>
        </div>
    </div>

    <div id="plansModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('plansModal')">&times;</span>
            <div class
